<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SkyBridge - Portal</title>
        <link rel="stylesheet" href="/assets/css/portal.css" />
    </head>
    <body>
        <div class="container">
            <h1>SKYBRIDGE</h1>

            <div class="form-group">
                <label for="code">9-character code</label>
                <input
                    type="text"
                    id="code"
                    placeholder="e.g., SN17xl9Y0"
                    maxlength="9"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="none"
                    spellcheck="false"
                />
            </div>

            <button onclick="decodeCode()">Open dashboard</button>

            <a id="link-btn" class="link-button" target="_blank"></a>
        </div>

        <script>
            const codeInput = document.getElementById("code");
            const linkBtn = document.getElementById("link-btn");

            codeInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") decodeCode();
            });

            async function decodeCode() {
                const code = codeInput.value.trim();
                if (!code) {
                    alert("Please enter a code");
                    return;
                }
                if (code.length !== 9) {
                    alert("Code must be exactly 9 characters");
                    return;
                }
                try {
                    const response = await fetch(`/api/decode/${code}`);
                    const data = await response.json();
                    if (data.success) {
                        linkBtn.href = data.link + "/dashboard";
                        linkBtn.click();
                    } else {
                        alert(data.error || "Failed to decode");
                    }
                } catch (e) {
                    alert("Network error: " + e.message);
                }
            }
        </script>
    </body>

    <footer>
        Made by ❤️ of ✈️ by
        <a
            href="https://github.com/wirenux"
            target="_blank"
            style="color: #007bff; text-decoration: none"
            >@wirenux</a
        >
    </footer>
</html>
