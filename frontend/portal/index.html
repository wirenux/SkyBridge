<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SkyBridge - Portal</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Oxygen, Ubuntu, Cantarell, sans-serif;
                background-color: #f5f5f5;
                color: #333;
                line-height: 1.6;
            }

            .container {
                max-width: 500px;
                margin: 0 auto;
                padding: 40px 20px;
            }

            h1 {
                font-size: 32px;
                font-weight: 600;
                margin-bottom: 30px;
                text-align: center;
                letter-spacing: -0.5px;
            }

            .form-group {
                margin-bottom: 20px;
            }

            label {
                display: block;
                font-size: 14px;
                font-weight: 500;
                margin-bottom: 8px;
                color: #555;
            }

            input {
                width: 100%;
                padding: 12px 14px;
                font-size: 16px;
                border: 1px solid #ddd;
                border-radius: 6px;
                transition: all 0.2s ease;
                font-family: inherit;
            }

            input:focus {
                outline: none;
                border-color: #333;
                box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.05);
            }

            button {
                width: 100%;
                padding: 12px 16px;
                font-size: 16px;
                font-weight: 500;
                background-color: #333;
                color: white;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                transition: background-color 0.2s ease;
                margin-bottom: 20px;
            }

            button:hover {
                background-color: #555;
            }

            button:active {
                background-color: #222;
            }

            .result {
                background-color: white;
                border: 1px solid #e0e0e0;
                border-radius: 6px;
                padding: 20px;
                display: none;
                transition: all 0.3s ease;
            }

            .result.show {
                display: block;
            }

            .result.success {
                border-color: #d4edda;
                background-color: #f8f9fa;
            }

            .result.error {
                border-color: #f8d7da;
                background-color: #f8f9fa;
            }

            .result p {
                margin-bottom: 12px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 14px;
            }

            .result p:last-child {
                margin-bottom: 0;
            }

            .result-label {
                font-weight: 600;
                color: #666;
            }

            .result-value {
                color: #333;
                word-break: break-all;
                text-align: right;
                flex: 1;
                margin-left: 12px;
            }

            .link-button {
                display: inline-block;
                width: 100%;
                padding: 10px 16px;
                margin-top: 12px;
                background-color: #333;
                color: white;
                text-decoration: none;
                border-radius: 6px;
                text-align: center;
                font-size: 14px;
                font-weight: 500;
                transition: background-color 0.2s ease;
            }

            .link-button:hover {
                background-color: #555;
            }

            .error-text {
                color: #721c24;
                font-size: 14px;
                text-align: center;
                padding: 8px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>🌉 SkyBridge</h1>

            <div class="form-group">
                <label for="code">Enter 9-character code:</label>
                <input
                    type="text"
                    id="code"
                    placeholder="e.g., SN17xl9Y0"
                    maxlength="9"
                    autocomplete="off"
                />
            </div>

            <button onclick="decodeCode()">Decode</button>

            <div id="result" class="result">
                <p>
                    <span class="result-label">Code:</span>
                    <span class="result-value" id="result-code"></span>
                </p>
                <p>
                    <span class="result-label">IP:</span>
                    <span class="result-value" id="result-ip"></span>
                </p>
                <p>
                    <span class="result-label">Port:</span>
                    <span class="result-value" id="result-port"></span>
                </p>
                <p>
                    <span class="result-label">Link:</span>
                    <span class="result-value" id="result-link"></span>
                </p>
                <a id="link-btn" class="link-button" target="_blank"
                    >Open Dashboard</a
                >
            </div>
        </div>

        <script>
            const codeInput = document.getElementById("code");
            const resultDiv = document.getElementById("result");

            // Allow Enter key to decode
            codeInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") decodeCode();
            });

            async function decodeCode() {
                const code = codeInput.value.trim();

                if (!code) {
                    showError("Please enter a code");
                    return;
                }

                if (code.length !== 9) {
                    showError("Code must be exactly 9 characters");
                    return;
                }

                try {
                    const response = await fetch(`/api/decode/${code}`);
                    const data = await response.json();

                    if (data.success) {
                        showResult(data);
                    } else {
                        showError(data.error || "Failed to decode code");
                    }
                } catch (error) {
                    showError("Network error: " + error.message);
                }
            }

            function showResult(data) {
                document.getElementById("result-code").textContent = data.code;
                document.getElementById("result-ip").textContent = data.ip;
                document.getElementById("result-port").textContent = data.port;
                document.getElementById("result-link").textContent = data.link;

                const linkBtn = document.getElementById("link-btn");
                linkBtn.href = data.link;

                resultDiv.className = "result show success";

                // Hide error message if any
                const errorMsg = resultDiv.querySelector(".error-message");
                if (errorMsg) errorMsg.style.display = "none";
            }

            function showError(message) {
                let errorMsg = resultDiv.querySelector(".error-message");
                if (!errorMsg) {
                    errorMsg = document.createElement("p");
                    errorMsg.className = "error-message error-text";
                    resultDiv.insertBefore(errorMsg, resultDiv.firstChild);
                }
                errorMsg.textContent = `❌ ${message}`;
                errorMsg.style.display = "block";
                resultDiv.className = "result show error";
            }
        </script>
    </body>
</html>
