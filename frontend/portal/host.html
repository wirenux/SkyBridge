<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SkyBridge - Host</title>
        <link rel="stylesheet" href="/assets/css/common.css" />
        <link rel="stylesheet" href="/assets/css/host.css" />
    </head>
    <body>
        <div class="container">
            <h1>🌉 SkyBridge Host</h1>

            <div class="nav-links">
                <a href="/">Decode</a>
                <a href="/host" class="active">Host</a>
            </div>

            <div class="form-group">
                <label for="port">Port (default: 5000):</label>
                <input
                    type="number"
                    id="port"
                    placeholder="5000"
                    value="5000"
                    min="1"
                    max="65535"
                />
            </div>

            <button onclick="getAndEncode()">Get My Code</button>

            <div id="result" class="result">
                <p>
                    <span class="result-label">Code:</span>
                    <span class="result-value" id="result-code"></span>
                </p>
                <button class="copy-btn" onclick="copyToClipboard(this)">
                    Copy Code
                </button>
            </div>
        </div>

        <script>
            let currentCode = "";

            async function getAndEncode() {
                const portInput = document.getElementById("port");
                const port = parseInt(portInput.value) || 5000;

                if (port < 1 || port > 65535) {
                    showError("Port must be between 1 and 65535");
                    return;
                }

                try {
                    const response = await fetch(`/api/local-ip?port=${port}`);
                    const data = await response.json();

                    if (data.success) {
                        showResult(data);
                    } else {
                        showError(data.error || "Failed to get IP");
                    }
                } catch (error) {
                    showError("Network error: " + error.message);
                }
            }

            function showResult(data) {
                document.getElementById("result-code").textContent = data.code;
                currentCode = data.code;

                const resultDiv = document.getElementById("result");
                resultDiv.className = "result show success";

                const errorMsg = resultDiv.querySelector(".error-message");
                if (errorMsg) errorMsg.style.display = "none";
            }

            function showError(message) {
                const resultDiv = document.getElementById("result");
                let errorMsg = resultDiv.querySelector(".error-message");
                if (!errorMsg) {
                    errorMsg = document.createElement("p");
                    errorMsg.className = "error-message error-text";
                    resultDiv.insertBefore(errorMsg, resultDiv.firstChild);
                }
                errorMsg.textContent = `❌ ${message}`;
                errorMsg.style.display = "block";
                resultDiv.className = "result show error";
            }

            function copyToClipboard(button) {
                if (!currentCode) return;

                navigator.clipboard
                    .writeText(currentCode)
                    .then(() => {
                        const originalText = button.textContent;
                        button.textContent = "✓ Copied!";
                        button.classList.add("copied");

                        setTimeout(() => {
                            button.textContent = originalText;
                            button.classList.remove("copied");
                        }, 2000);
                    })
                    .catch(() => {
                        alert("Failed to copy to clipboard");
                    });
            }

            // Allow Enter key to encode
            document
                .getElementById("port")
                .addEventListener("keypress", (e) => {
                    if (e.key === "Enter") getAndEncode();
                });
        </script>
    </body>
</html>
