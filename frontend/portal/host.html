<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SkyBridge - Host</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Oxygen, Ubuntu, Cantarell, sans-serif;
                background-color: #f5f5f5;
                color: #333;
                line-height: 1.6;
            }

            .container {
                max-width: 500px;
                margin: 0 auto;
                padding: 40px 20px;
            }

            h1 {
                font-size: 32px;
                font-weight: 600;
                margin-bottom: 30px;
                text-align: center;
                letter-spacing: -0.5px;
            }

            .form-group {
                margin-bottom: 20px;
            }

            label {
                display: block;
                font-size: 14px;
                font-weight: 500;
                margin-bottom: 8px;
                color: #555;
            }

            input {
                width: 100%;
                padding: 12px 14px;
                font-size: 16px;
                border: 1px solid #ddd;
                border-radius: 6px;
                transition: all 0.2s ease;
                font-family: inherit;
            }

            input:focus {
                outline: none;
                border-color: #333;
                box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.05);
            }

            input:disabled {
                background-color: #f5f5f5;
                color: #999;
            }

            button {
                width: 100%;
                padding: 12px 16px;
                font-size: 16px;
                font-weight: 500;
                background-color: #333;
                color: white;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                transition: background-color 0.2s ease;
                margin-bottom: 20px;
            }

            button:hover {
                background-color: #555;
            }

            button:active {
                background-color: #222;
            }

            button:disabled {
                background-color: #ccc;
                cursor: not-allowed;
            }

            .result {
                background-color: white;
                border: 1px solid #e0e0e0;
                border-radius: 6px;
                padding: 20px;
                display: none;
                transition: all 0.3s ease;
            }

            .result.show {
                display: block;
            }

            .result.success {
                border-color: #d4edda;
                background-color: #f8f9fa;
            }

            .result.error {
                border-color: #f8d7da;
                background-color: #f8f9fa;
            }

            .result p {
                margin-bottom: 12px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 14px;
            }

            .result p:last-child {
                margin-bottom: 0;
            }

            .result-label {
                font-weight: 600;
                color: #666;
            }

            .result-value {
                color: #333;
                word-break: break-all;
                text-align: right;
                flex: 1;
                margin-left: 12px;
                font-family: "Monaco", "Courier New", monospace;
                font-size: 13px;
            }

            .copy-btn {
                display: inline-block;
                padding: 6px 12px;
                margin-top: 12px;
                background-color: #333;
                color: white;
                text-decoration: none;
                border-radius: 6px;
                text-align: center;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                border: none;
                transition: background-color 0.2s ease;
            }

            .copy-btn:hover {
                background-color: #555;
            }

            .copy-btn.copied {
                background-color: #28a745;
            }

            .error-text {
                color: #721c24;
                font-size: 14px;
                text-align: center;
                padding: 8px;
            }

            .nav-links {
                display: flex;
                gap: 12px;
                margin-bottom: 20px;
            }

            .nav-links a {
                flex: 1;
                padding: 10px 16px;
                background-color: #f0f0f0;
                color: #333;
                text-decoration: none;
                border-radius: 6px;
                text-align: center;
                font-size: 14px;
                font-weight: 500;
                transition: background-color 0.2s ease;
            }

            .nav-links a:hover {
                background-color: #e0e0e0;
            }

            .nav-links a.active {
                background-color: #333;
                color: white;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>🌉 SkyBridge Host</h1>

            <div class="nav-links">
                <a href="/">Decode</a>
                <a href="/host" class="active">Host</a>
            </div>

            <div class="form-group">
                <label for="port">Port (default: 5000):</label>
                <input
                    type="number"
                    id="port"
                    placeholder="5000"
                    value="5000"
                    min="1"
                    max="65535"
                />
            </div>

            <button onclick="getAndEncode()">Get My Code</button>

            <div id="result" class="result">
                <p>
                    <span class="result-label">Code:</span>
                    <span class="result-value" id="result-code"></span>
                </p>
                <button class="copy-btn" onclick="copyToClipboard(this)">
                    Copy Code
                </button>
            </div>
        </div>

        <script>
            let currentCode = "";

            async function getAndEncode() {
                const portInput = document.getElementById("port");
                const port = parseInt(portInput.value) || 5000;

                if (port < 1 || port > 65535) {
                    showError("Port must be between 1 and 65535");
                    return;
                }

                try {
                    const response = await fetch(`/api/local-ip?port=${port}`);
                    const data = await response.json();

                    if (data.success) {
                        showResult(data);
                    } else {
                        showError(data.error || "Failed to get IP");
                    }
                } catch (error) {
                    showError("Network error: " + error.message);
                }
            }

            function showResult(data) {
                document.getElementById("result-code").textContent = data.code;
                currentCode = data.code;

                const resultDiv = document.getElementById("result");
                resultDiv.className = "result show success";

                const errorMsg = resultDiv.querySelector(".error-message");
                if (errorMsg) errorMsg.style.display = "none";
            }

            function showError(message) {
                const resultDiv = document.getElementById("result");
                let errorMsg = resultDiv.querySelector(".error-message");
                if (!errorMsg) {
                    errorMsg = document.createElement("p");
                    errorMsg.className = "error-message error-text";
                    resultDiv.insertBefore(errorMsg, resultDiv.firstChild);
                }
                errorMsg.textContent = `❌ ${message}`;
                errorMsg.style.display = "block";
                resultDiv.className = "result show error";
            }

            function copyToClipboard(button) {
                if (!currentCode) return;

                navigator.clipboard
                    .writeText(currentCode)
                    .then(() => {
                        const originalText = button.textContent;
                        button.textContent = "✓ Copied!";
                        button.classList.add("copied");

                        setTimeout(() => {
                            button.textContent = originalText;
                            button.classList.remove("copied");
                        }, 2000);
                    })
                    .catch(() => {
                        alert("Failed to copy to clipboard");
                    });
            }

            // Allow Enter key to encode
            document
                .getElementById("port")
                .addEventListener("keypress", (e) => {
                    if (e.key === "Enter") getAndEncode();
                });
        </script>
    </body>
</html>
