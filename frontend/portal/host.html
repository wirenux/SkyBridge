<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SkyBridge · Host</title>
        <link rel="stylesheet" href="/assets/css/portal.css" />
    </head>
    <body>
        <div class="container">
            <h1>SKYBRIDGE</h1>

            <div class="nav-links">
                <a href="/">Decode</a>
                <a href="/host" class="active">Host</a>
            </div>

            <div class="form-group">
                <label for="port">Dashboard port</label>
                <input
                    type="number"
                    id="port"
                    placeholder="5000"
                    value="5000"
                    min="1"
                    max="65535"
                />
            </div>

            <button onclick="getAndEncode()">Generate code</button>

            <div id="result" class="result">
                <p>
                    <span class="result-label">Code</span>
                    <span class="result-value" id="result-code"></span>
                </p>
                <button class="copy-btn" onclick="copyToClipboard(this)">
                    Copy code
                </button>
            </div>
        </div>

        <script>
            let currentCode = "";

            async function getAndEncode() {
                const port =
                    parseInt(document.getElementById("port").value) || 5001;
                if (port < 1 || port > 65535) {
                    showError("Port must be between 1 and 65535");
                    return;
                }
                try {
                    const response = await fetch(`/api/local-ip?port=${port}`);
                    const data = await response.json();
                    data.success
                        ? showResult(data)
                        : showError(data.error || "Failed to get IP");
                } catch (e) {
                    showError("Network error: " + e.message);
                }
            }

            function showResult(data) {
                document.getElementById("result-code").textContent = data.code;
                currentCode = data.code;
                const r = document.getElementById("result");
                r.className = "result show success";
                const err = r.querySelector(".error-message");
                if (err) err.style.display = "none";
            }

            function showError(message) {
                const r = document.getElementById("result");
                let err = r.querySelector(".error-message");
                if (!err) {
                    err = document.createElement("p");
                    err.className = "error-message";
                    r.insertBefore(err, r.firstChild);
                }
                err.textContent = `❌ ${message}`;
                err.style.display = "block";
                r.className = "result show error";
            }

            function copyToClipboard(button) {
                if (!currentCode) return;
                navigator.clipboard
                    .writeText(currentCode)
                    .then(() => {
                        button.textContent = "✓ Copied!";
                        button.classList.add("copied");
                        setTimeout(() => {
                            button.textContent = "Copy code";
                            button.classList.remove("copied");
                        }, 2000);
                    })
                    .catch(() => alert("Failed to copy"));
            }

            document
                .getElementById("port")
                .addEventListener("keypress", (e) => {
                    if (e.key === "Enter") getAndEncode();
                });
        </script>
    </body>
</html>
