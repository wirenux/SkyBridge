<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <link rel="stylesheet" href="/assets/css/dashboard.css" />
        <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="/assets/js/theme.js"></script>
        <script src="/assets/js/dashboard.js" defer></script>
        <meta name="screen-wake-lock" content="disabled" />
        <title>SkyBridge - Dashboard</title>
    </head>
    <body>
        <header>
            <h1>SKYBRIDGE</h1>

            <!-- Header -->
            <div class="header-right">
                <button
                    class="theme-toggle"
                    id="theme-toggle"
                    title="Toggle dark mode"
                >
                    🌙
                </button>
                <div class="status-pill">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status">Connecting...</span>
                </div>
            </div>
        </header>

        <div class="dashboard">
            <div class="card">
                <div class="card-title">Heading</div>
                <div class="card-body">
                    <div class="hdg-instrument">
                        <canvas id="hdg-tape"></canvas>
                        <div class="hdg-readout" id="hdg-readout">000°</div>
                    </div>
                </div>
            </div>

            <!-- Map -->
            <div class="card">
                <div class="card-title">Position</div>
                <div class="map-wrap">
                    <div id="map"></div>
                    <button id="follow-btn" onclick="toggleFollow()">📍</button>
                    <button id="airports-btn" onclick="toggleAirports()">
                        🛬
                    </button>
                </div>
            </div>

            <!-- ADI -->
            <div class="card">
                <div class="card-title">Nav Ball</div>
                <div class="adi-instrument">
                    <canvas id="adi-canvas"></canvas>
                </div>
            </div>

            <!-- Speed -->
            <div class="card">
                <div class="card-title">Speed</div>
                <div class="speed-grid">
                    <div class="speed-cell">
                        <span class="data-label">GS</span>
                        <span class="data-value" id="gs">—</span>
                    </div>
                    <div class="speed-cell">
                        <span class="data-label">IAS</span>
                        <span class="data-value highlight" id="ias">—</span>
                    </div>
                    <div class="speed-cell">
                        <span class="data-label">TAS</span>
                        <span class="data-value" id="tas">—</span>
                    </div>
                    <div class="speed-cell">
                        <span class="data-label">MACH</span>
                        <span class="data-value" id="mach">—</span>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="card">
                <div class="card-title">Navigation</div>
                <div class="data-row">
                    <span class="data-label">ALT</span>
                    <span class="data-value highlight" id="alt">—</span>
                </div>
                <div class="data-row">
                    <span class="data-label">HDG</span>
                    <span class="data-value highlight" id="hdg">—</span>
                </div>
                <div class="data-row">
                    <span class="data-label">VS</span>
                    <span class="data-value" id="vs">—</span>
                </div>
            </div>

            <!-- Engines -->
            <div class="card">
                <div class="card-title">Engines</div>
                <div id="engines"></div>
            </div>

            <!-- Location -->
            <div class="card">
                <div class="card-title">Location</div>
                <div class="data-row">
                    <span class="data-label">LAT</span>
                    <span class="data-value" id="lat">—</span>
                </div>
                <div class="data-row">
                    <span class="data-label">LON</span>
                    <span class="data-value" id="lon">—</span>
                </div>
            </div>

            <!-- Systems -->
            <div class="card">
                <div class="card-title">Systems</div>
                <div class="data-row">
                    <span class="data-label">Gear</span>
                    <span class="ap-badge" id="gear-status">-</span>
                </div>
                <div class="data-row">
                    <span class="data-label">FLAPS</span>
                    <span class="data-value" id="flaps">—</span>
                </div>
                <div class="data-row">
                    <span class="data-label">OAT</span>
                    <span class="data-value" id="oat">—</span>
                </div>
                <div class="data-row">
                    <span class="data-label">TRIM</span>
                    <span class="data-value" id="trim">—</span>
                </div>
                <div class="data-row">
                    <span class="data-label">SPLR</span>
                    <span class="data-value" id="spoiler">—</span>
                </div>
                <div class="data-row">
                    <span class="data-label">FUEL</span>
                    <span class="data-value" id="fuel">—</span>
                </div>
                <div class="data-row">
                    <span class="data-label">AOA</span>
                    <span class="data-value" id="aoa">—</span>
                </div>
                <div class="data-row">
                    <span class="data-label">G</span>
                    <span class="data-value" id="g">—</span>
                </div>
            </div>

            <!-- Autopilot -->
            <div class="card">
                <div class="card-title">Autopilot</div>
                <div class="ap-header">
                    <span class="data-label">STATUS</span>
                    <span class="ap-badge" id="ap-status">OFF</span>
                </div>
                <div id="ap-details"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer-bar" id="last-update">
            <p id="update-time">—</p>
            Made by ❤️ of ✈️ by
            <a
                href="https://github.com/wirenux"
                target="_blank"
                style="color: #007bff; text-decoration: none"
                >@wirenux</a
            >
        </div>
    </body>
</html>
